site_name: Zinciol Docs

dev_addr: '192.168.100.90:8000'

repo_url: https://github.com/Zinciol/zinciol.github.io
repo_name: ZinciolGithub
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - content.action.edit
    - content.action.view
    - navigation.top
    - navigation.tabs
  palette:
    #- scheme: slate
    #- primary: cyan
    #- accent: teal
    - scheme: slate
      primary: cyan
      accent: teal
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

    - scheme: default
      primary: cyan
      accent: teal
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode

markdown_extensions:
  - toc:
      permalink: true

extra:
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject
  analytics:
    provider: google
    property: G-#####
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="..." target="_blank" rel="noopener">feedback form</a>.

nav:
  - Home: index.md
    - About Us: home/about-us.md
    - Using The Site: home/using-the-site.md
  - Information: information/index.md
    - Using Information: information/using-information.md



